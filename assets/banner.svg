<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7e5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#feb47b;stop-opacity:1" />
    </linearGradient>
    <style>
      .text-anim {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 64px;
        font-weight: bold;
        fill: #fff;
        text-anchor: middle;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .subtitle {
        font-family: monospace;
        font-size: 24px;
        fill: #ffffff99;
        text-anchor: middle;
      }
    </style>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#grad1)" />
  <text x="400" y="110" class="text-anim">Awesome Overfitting</text>
  <text x="400" y="150" class="subtitle">A curated list of overfitting resources</text>
</svg>
